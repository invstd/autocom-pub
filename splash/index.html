<script>
(function() {
  var splash = document.querySelector(".splash-page");
  if (!splash) return;
  var basePath = (splash.getAttribute("data-base-path") || "").replace(/\/?$/, "/");
  var params = new URLSearchParams(window.location.search);
  var to = params.get("to");
  var redirect = params.get("redirect");
  var targetUrl = null;
  if (redirect) {
    targetUrl = redirect.startsWith("http") ? redirect : basePath + redirect.replace(/^\//, "");
  } else if (to === "prototype-1") {
    targetUrl = basePath + "prototype-1/";
  } else {
    targetUrl = basePath + "launchpad-1/";
  }
  function go() {
    window.location.replace(targetUrl);
  }
  if (to || redirect) {
    setTimeout(go, 4300);
  }
})();
</script>
