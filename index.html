<!DOCTYPE html>
<html lang="en" data-theme="Hi-Tech">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Autocom Prototypes - Autocom Prototypes</title>
    <script>
      (function() {
        var saved = localStorage.getItem('theme');
        document.documentElement.setAttribute('data-theme', saved || 'Hi-Tech');
      })();
    </script>
    <script>
      (function () {
        try {
          if (sessionStorage.getItem('autocom-prototype-gate') === '1') {
            document.documentElement.classList.add('prototype-gate-unlocked');
          }
        } catch (e) {}
      })();
    </script>
    <link rel="stylesheet" href="/autocom-pub/assets/styles/main.css">
    <script src="https://cdn.jsdelivr.net/npm/theme-change@2.5.0/index.js" defer></script>
    <script>
      if (typeof themeChange !== 'undefined') themeChange();
      else document.addEventListener('DOMContentLoaded', function() { if (typeof themeChange !== 'undefined') themeChange(); });
    </script>
</head>
<body class="bg-base-100 text-base-content">
    
<div class="min-h-screen flex flex-col">
    <nav class="site-nav navbar bg-base-100 shadow-lg">
    <div class="flex-1">
        <a class="btn btn-ghost text-xl" href="/autocom-pub/">Autocom</a>
    </div>
    <div class="flex-none">
        <ul class="menu menu-horizontal px-1">
            <li><a href="/autocom-pub/">Home</a></li>
            <li>
                <details id="theme-dropdown">
                    <summary>Theme</summary>
                    <ul class="bg-base-100 rounded-t-none p-2 z-50">
                        <li><a href="#" onclick="event.preventDefault(); document.documentElement.setAttribute('data-theme', 'Autocom'); localStorage.setItem('theme', 'Autocom'); document.getElementById('theme-dropdown').removeAttribute('open'); return false;">Autocom</a></li>
                        <li><a href="#" onclick="event.preventDefault(); document.documentElement.setAttribute('data-theme', 'light'); localStorage.setItem('theme', 'light'); document.getElementById('theme-dropdown').removeAttribute('open'); return false;">Light</a></li>
                        <li><a href="#" onclick="event.preventDefault(); document.documentElement.setAttribute('data-theme', 'dark'); localStorage.setItem('theme', 'dark'); document.getElementById('theme-dropdown').removeAttribute('open'); return false;">Dark</a></li>
                        <li><a href="#" onclick="event.preventDefault(); document.documentElement.setAttribute('data-theme', 'Hi-Tech'); localStorage.setItem('theme', 'Hi-Tech'); document.getElementById('theme-dropdown').removeAttribute('open'); return false;">Hi-Tech</a></li>
                    </ul>
                </details>
            </li>
        </ul>
    </div>
</nav>


    <main class="flex-1 flex flex-col min-h-0 container mx-auto px-4 py-8">
        <div class="hero flex-1 flex min-h-0 items-center justify-center">
            <div class="hero-content text-center w-full max-w-full">
            <div class="max-w-md mx-auto">
                <h1 class="mb-5 text-5xl font-bold">Autocom Prototypes</h1>
                <p class="mb-5">Collection of usability testing prototypes</p>
                
                <div class="divider">Available Prototypes</div>
                
                <div class="grid gap-4">
                    <a href="/autocom-pub/splash/?to=launchpad-1" class="btn btn-primary btn-lg">
                        Launchpad 1
                    </a>
                </div>
            </div>
        </div>
    </main>
</div>

    
<div id="prototype-gate-root" class="prototype-gate-root fixed inset-0 z-[9999] flex items-center justify-center bg-black/70 p-4 backdrop-blur-sm" aria-modal="true" role="dialog" aria-labelledby="prototype-gate-title" aria-describedby="prototype-gate-desc">
  <div class="card bg-base-100 border border-base-300 shadow-xl w-full max-w-xs sm:max-w-sm">
    <div class="card-body p-6 sm:p-8">
      <h2 id="prototype-gate-title" class="card-title text-xl mb-3">Prototype access</h2>
      <p id="prototype-gate-desc" class="text-sm text-base-content/80 leading-relaxed mb-8">This build is password-protected. Enter the password to continue.</p>
      <div class="flex flex-col gap-8">
        <label class="floating-label w-full">
          <input type="password" id="prototype-gate-input" class="input input-bordered w-full" placeholder="Password" autocomplete="current-password" />
          <span>Password</span>
        </label>
        <div class="flex flex-col gap-3">
          <p id="prototype-gate-error" class="text-sm text-error leading-snug hidden min-h-0" role="alert">Incorrect password. Try again.</p>
          <button type="button" id="prototype-gate-submit" class="btn btn-primary btn-block">Continue</button>
        </div>
      </div>
      <noscript><p class="text-sm text-warning mt-6">JavaScript is required to unlock this prototype.</p></noscript>
    </div>
  </div>
</div>

    <script src="/autocom-pub/assets/scripts/prototype-gate.js"></script>
</body>
</html>
